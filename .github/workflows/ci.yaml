name: CI + Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - v4  # Adapte si tu déploies depuis une autre branche

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public
          name: quartz-site

      - name: Download artifact
        uses: actions/download-pages-artifact@v4
        with:
          name: quartz-site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
