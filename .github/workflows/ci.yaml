name: CI + Deploy Quartz to GitHub Pages (artifact@v4)

on:
  push:
    branches:
      - v4  # Déclenche sur push vers la branche v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update npm
        run: npm install -g npm@10.9.2

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages  # 👈 Nom que l'action deploy-pages atte
